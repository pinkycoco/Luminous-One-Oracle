<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Luminous Oracle</title>
</head>

<body style="text-align:center; font-family:sans-serif; padding-top:50px; background:linear-gradient(#FFF0F5,#FFFACD);">

<h1>🌈Luminous Oracle🧚‍♀️</h1>

<p style="font-size:18px; color:#ff69b4; margin-top:10px;">
🕊️✨質問を思い浮かべながら、クリックしてね✨🕊️
</p>

<button onclick="fortune()" style="font-size:20px; padding:15px 25px; border-radius:20px; background:pink; border:none;">
💖🐣メッセージを引く🐣💖
</button>

<p id="result" style="font-size:30px; margin-top:20px; transition:1s;"></p>

<img id="resultImage" style="width:250px; margin:20px auto; display:block; border-radius:20px;">

<script>
function fortune() {
  const results = [
    { text: "YES✨最高の流れ💖", img: "images/yes1.png" },
    { text: "NO🍃いまは休む時🛌", img: "images/no1.png" },
    { text: "BIG YES🌈奇跡くる🌟", img: "images/bigyes.png" },
    { text: "WAIT🌙もう少し待って🤚", img: "images/wait.png" },
    { text: "YES👍今はGOのタイミング✨", img: "images/yes2.png" },
    { text: "GO🌟そのまま進んで大丈夫🌈", img: "images/yes3.png" },
    { text: "YES💫流れに乗ってOK🕊️", img: "images/yes4.png" },
    { text: "WAIT🤚少し待つといいかも🍃", img: "images/wait2.png" },
    { text: "NO🍃今は整える時間🧘‍♀️✨", img: "images/no2.png" },
    { text: "NO🌙無理しなくて大丈夫🐣", img: "images/no3.png" }
  ];

  const random = Math.floor(Math.random() * results.length);
  const result = results[random];

  const resultText = document.getElementById("result");
  const resultImage = document.getElementById("resultImage");

  resultText.style.opacity = 0;
  resultImage.style.display = "none";

  setTimeout(() => {
    resultText.innerText = result.text;

    resultImage.src = result.img;
    resultImage.style.display = "block";

    if (result.text.includes("BIG YES")) {
      alert("🌈✨奇跡モード発動✨🌈");

      document.body.style.background = "linear-gradient(#FFD700,#FF69B4)";

      setTimeout(() => {
        document.body.style.background = "linear-gradient(#FFF0F5,#FFFACD)";
      }, 2000);
    }

    resultText.style.opacity = 1;
  }, 600);
}
</script>

</body>
</html>
